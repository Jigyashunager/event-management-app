version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: event-platform-db
    environment:
      POSTGRES_DB: event_platform_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - event-platform-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: event-platform-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - event-platform-network

  # pgAdmin for Database Management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: event-platform-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@eventplatform.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "8080:80"
    depends_on:
      - postgres
    networks:
      - event-platform-network

volumes:
  postgres_data:
  redis_data:

networks:
  event-platform-network:
    driver: bridge