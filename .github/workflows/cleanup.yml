name: Cleanup Merged Branches

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  delete-branch:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
  steps:
    - name: Delete branch
      uses: dawidd6/action-delete-branch@v3
      with:
        branch: cleanup-action-workflow
        token: ${{ secrets.PAT_TOKEN }}
