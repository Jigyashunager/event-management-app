name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    needs: [quality-checks, test]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
        
      - name: Build for production
        run: npm run build
        
      - name: Build Docker images
        run: |
          docker build -t event-platform/customer-web ./apps/customer-web
          docker build -t event-platform/vendor-dashboard ./apps/vendor-dashboard
          docker build -t event-platform/api-gateway ./services/api-gateway
        
      # Add your deployment steps here (AWS, Vercel, etc.)
      - name: Deploy to production
        run: echo "Add your deployment commands here"